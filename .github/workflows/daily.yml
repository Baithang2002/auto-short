name: Daily Shorts Publish

on:
  schedule:
    # 12:30 UTC = 18:00 IST. Cron is UTC in GitHub Actions.
    - cron: '30 12 * * *'
  workflow_dispatch:       # also allow manual trigger from the Actions tab
    inputs:
      topic:
        description: 'Override topic (leave blank to use topics.txt rotation)'
        required: false
        default: ''

permissions:
  contents: write          # needed to commit daily_state.json back after each run

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install ffmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg
          ffmpeg -version | head -1

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore rotation state from previous run
        run: |
          # state/ is tracked in the repo; output/ is gitignored. Seed the
          # gitignored output/ files from state/ so the rotation continues.
          mkdir -p output
          [ -f state/daily_state.json ] && cp state/daily_state.json output/daily_state.json || true
          [ -f state/daily_runs.log ]   && cp state/daily_runs.log   output/daily_runs.log   || true
          [ -f state/used_videos.json ] && cp state/used_videos.json used_videos.json        || true
          echo "--- state restored ---"
          ls -la output/daily_state.json output/daily_runs.log used_videos.json 2>/dev/null || true

      - name: Render + upload daily video
        env:
          # Script providers
          GEMINI_API_KEY:      ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY:        ${{ secrets.GROQ_API_KEY }}
          OPENAI_API_KEY:      ${{ secrets.OPENAI_API_KEY }}
          SAMBANOVA_API_KEY:   ${{ secrets.SAMBANOVA_API_KEY }}

          # Stock sources
          PEXELS_API_KEY:      ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY:     ${{ secrets.PIXABAY_API_KEY }}

          # Music
          JAMENDO_CLIENT_ID:   ${{ secrets.JAMENDO_CLIENT_ID }}

          # YouTube Data API (replaces browser upload)
          YT_CLIENT_ID:        ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET:    ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN:    ${{ secrets.YT_REFRESH_TOKEN }}
        run: |
          # CI never has stdin attached. Always use --no-interactive.
          if [ -n "${{ github.event.inputs.topic }}" ]; then
            python pipeline.py "${{ github.event.inputs.topic }}" --platforms youtube --no-interactive
          else
            python pipeline_daily.py
          fi

      - name: Persist rotation state back to repo
        if: always()
        run: |
          # The rotation index lives in output/daily_state.json (gitignored).
          # Force-add it so tomorrow's run uses the next topic.
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          mkdir -p state
          [ -f output/daily_state.json ] && cp output/daily_state.json state/daily_state.json
          [ -f output/daily_runs.log ]   && cp output/daily_runs.log   state/daily_runs.log
          [ -f used_videos.json ]        && cp used_videos.json        state/used_videos.json
          git add state/ || true
          if git diff --staged --quiet; then
            echo "No state changes to commit."
          else
            git commit -m "ci: persist daily rotation state [skip ci]"
            git pull --rebase origin main
            git push
          fi

      - name: Upload run artifacts (debug)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: render-${{ github.run_number }}
          path: |
            output/final.mp4
            output/final_yt_safe.mp4
            output/upload_metadata.json
            output/daily_runs.log
            output/screenshots/
          retention-days: 7
          if-no-files-found: ignore
