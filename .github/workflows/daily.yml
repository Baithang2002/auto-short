name: Daily Shorts Publish

on:
  schedule:
    # Cron is UTC. GitHub Actions on free tier sometimes skips :00/:30 minute
    # slots during high load. :17 and :47 are notoriously more reliable.
    - cron: '17 12 * * *'    # primary  - 17:47 IST (12:17 UTC)
    - cron: '47 12 * * *'    # backup   - 18:17 IST (12:47 UTC) - runs only if primary missed (guarded in pipeline_daily.py)
  workflow_dispatch:       # also allow manual trigger from the Actions tab
    inputs:
      topic:
        description: 'Override topic (leave blank to use topics.txt rotation)'
        required: false
        default: ''

permissions:
  contents: write          # needed to commit daily_state.json back after each run

concurrency:
  group: daily-shorts-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install ffmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg
          ffmpeg -version | head -1

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore rotation state from previous run
        run: |
          # state/ is the tracked source of truth. Seed output/ only for
          # compatibility with artifacts and older local tooling.
          mkdir -p output
          [ -f state/daily_state.json ] && cp state/daily_state.json output/daily_state.json || true
          [ -f state/daily_runs.log ]   && cp state/daily_runs.log   output/daily_runs.log   || true
          [ -f state/used_videos.json ] && cp state/used_videos.json used_videos.json        || true
          echo "--- state restored ---"
          ls -la output/daily_state.json output/daily_runs.log used_videos.json 2>/dev/null || true

      - name: Render + upload daily video
        timeout-minutes: 75
        env:
          # Script providers
          GEMINI_API_KEY:      ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY:        ${{ secrets.GROQ_API_KEY }}
          OPENAI_API_KEY:      ${{ secrets.OPENAI_API_KEY }}
          SAMBANOVA_API_KEY:   ${{ secrets.SAMBANOVA_API_KEY }}

          # Voice providers (ElevenLabs > Edge-TTS > Speechify; falls back
          # automatically when a secret is absent)
          ELEVENLABS_API_KEY:  ${{ secrets.ELEVENLABS_API_KEY }}
          ELEVENLABS_VOICE_ID: ${{ secrets.ELEVENLABS_VOICE_ID }}
          SPEECHIFY_API_KEY:   ${{ secrets.SPEECHIFY_API_KEY }}

          # Stock sources
          PEXELS_API_KEY:      ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY:     ${{ secrets.PIXABAY_API_KEY }}

          # Music (chain: jamendo -> pixabay -> mixkit -> generated -> silence)
          JAMENDO_CLIENT_ID:   ${{ secrets.JAMENDO_CLIENT_ID }}
          DEFAULT_NICHE:       "hidden science behind nature, Earth, animals, oceans, weather, and space"

          # YouTube Data API (replaces browser upload)
          YT_CLIENT_ID:        ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET:    ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN:    ${{ secrets.YT_REFRESH_TOKEN }}
          YT_MUSIC:            "true"
          AUTO_VIDEO_ENFORCE_PUBLISH_QUALITY_GATE: "true"
          AUTO_VIDEO_SOURCE_COVERAGE_ENFORCE: "true"
          # Try several different viable topics when a topic-specific quality
          # gate defers one. Technical failures still stop immediately.
          AUTO_VIDEO_DAILY_MAX_TOPIC_ATTEMPTS: "6"
          # Final downloaded-media verification. A critical scene that cannot
          # be proved from sampled frames stops before rendering/uploading.
          AUTO_VIDEO_VERIFIED_MEDIA_GATE_ENABLED: "true"
          AUTO_VIDEO_VERIFIED_MEDIA_CRITICAL_CONFIDENCE: "0.85"
          AUTO_VIDEO_VERIFIED_MEDIA_CRITICAL_ACTION_CONFIDENCE: "0.75"
          AUTO_VIDEO_VERIFIED_MEDIA_MAX_REPLACEMENTS: "2"
          AUTO_VIDEO_VERIFIED_MEDIA_FRAME_SAMPLES: "3"
          AUTO_VIDEO_VERIFIED_MEDIA_CRITICAL_POLICY: "abort"
          # An unavailable external vision model must not turn a valid render
          # into a failed daily run. Its outcome remains auditable as UNVERIFIED.
          AUTO_VIDEO_VERIFIED_MEDIA_ALLOW_VISION_UNAVAILABLE: "true"
        run: |
          # CI never has stdin attached. Always use --no-interactive.
          if [ -n "${{ github.event.inputs.topic }}" ]; then
            python pipeline.py "${{ github.event.inputs.topic }}" --platforms youtube --no-interactive
          else
            python pipeline_daily.py
          fi

      - name: Persist rotation state back to repo
        if: always()
        run: |
          # pipeline_daily.py writes state/ directly before rendering. Keep
          # output/ as a fallback for older runs, then commit the tracked state
          # even if render/upload failed or timed out.
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          mkdir -p state
          [ -f state/daily_state.json ] || { [ -f output/daily_state.json ] && cp output/daily_state.json state/daily_state.json; }
          [ -f state/daily_runs.log ]   || { [ -f output/daily_runs.log ]   && cp output/daily_runs.log   state/daily_runs.log; }
          [ -f used_videos.json ]        && cp used_videos.json        state/used_videos.json
          git add state/ || true
          if git diff --staged --quiet; then
            echo "No state changes to commit."
          else
            git commit -m "ci: persist daily rotation state [skip ci]"
            git checkout -- .
            git pull --rebase origin main
            git push
          fi

      - name: Upload run artifacts (debug)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: render-${{ github.run_number }}
          path: |
            output/final.mp4
            output/final_yt_safe.mp4
            output/upload_metadata.json
            output/scheduler_report.json
            output/source_coverage_report.json
            output/publish_quality_report.json
            output/daily_runs.log
            output/screenshots/
          retention-days: 7
          if-no-files-found: ignore
